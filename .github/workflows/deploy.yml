name: Build & Deploy to enricortan.github.io/eauction

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout eauction source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: Deploy to enricortan.github.io
        uses: cpina/github-action-push-to-another-repository@main
        env:
          SSH_DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        with:
          source-directory: dist
          destination-github-username: enricortan
          destination-repository-name: enricortan.github.io
          target-directory: eauction
          destination-branch: main
          commit-message: "Deploy eauction build"
